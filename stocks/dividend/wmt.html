<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KK98SSRKPM"></script>
    
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function generateTOC() {
            const tocList = $('#toc-list .etf-nav');
            tocList.empty();
            let ul = $('<ul></ul>').addClass('toc-menu');
            const mainContentArea = $('.container-1280');
            mainContentArea.find('section').each(function () {
                const sectionId = $(this).attr('id');
                const h2 = $(this).find('h2:first');
                if (sectionId && h2.length > 0) {
                    let title = h2.text();
                    const li = $('<li></li>');
                    const a = $('<a></a>').attr('href', '#' + sectionId).text(title);
                    li.append(a);
                    ul.append(li);
                }
            });
            tocList.append(ul);
        }

        $(document).ready(function () {
            $('.carousel').carousel();
            generateTOC();
            var mybutton = $('#return-to-top');
            $(window).scroll(function () {
                if ($(this).scrollTop() > 20) {
                    mybutton.fadeIn();
                } else {
                    mybutton.fadeOut();
                }
            });
            mybutton.click(function () {
                $('html, body').animate({ scrollTop: 0 }, 'slow');
                return false;
            });
            $('#toggle-toc').click(function () {
                var fixedToc = $('.fixed-toc');
                fixedToc.toggle();
                if (fixedToc.is(':visible')) {
                    fixedToc.addClass('show');
                } else {
                    fixedToc.removeClass('show');
                }
            });
            $('#toc-list').on('click', 'a', function () {
                $('.fixed-toc').hide().removeClass('show');
            });

            new TradingView.MediumWidget({
                container_id: 'tv-chart-wmt',
                symbols: [['WMT', 'NYSE:WMT|1D']],
                chartOnly: true,
                width: '100%',
                height: 420,
                locale: 'en',
                colorTheme: 'light',
                gridLineColor: 'rgba(240,243,250,1)',
                fontColor: '#667085',
                isTransparent: true,
                autosize: true,
                showVolume: false,
                hideVolume: true,
                scalePosition: 'right',
                scaleMode: 'Normal',
                fontFamily: 'Arial, sans-serif',
                noTimeScale: false,
                valuesTracking: '1',
                chartType: 'area',
                lineColor: 'rgba(57,59,68,1)',
                topColor: 'rgba(141,147,171,0.28)',
                bottomColor: 'rgba(141,147,171,0.04)',
                underLineColor: 'rgba(141,147,171,0.04)',
                trendLineColor: 'rgba(57,59,68,1)',
                timezone: 'America/New_York'
            });
        });
    </script>
</body>

</html>
